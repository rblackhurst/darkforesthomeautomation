<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DFHA{% endblock %}</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1419;
      color: #d4d4d4;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: #1a1f2e;
      border: 1px solid #2a3144;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 28rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .card.wide { max-width: 36rem; }
    h1 {
      margin: 0 0 0.25rem 0;
      font-size: 1.4rem;
      color: #f0f0f0;
    }
    .sub {
      margin: 0 0 1.5rem 0;
      color: #8a92a3;
      font-size: 0.9rem;
    }
    label {
      display: block;
      margin-bottom: 0.35rem;
      font-size: 0.85rem;
      color: #b0b6c4;
    }
    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 0.65rem 0.8rem;
      background: #0f1419;
      border: 1px solid #2a3144;
      border-radius: 6px;
      color: #f0f0f0;
      font-size: 1rem;
      font-family: inherit;
    }
    input:focus {
      outline: none;
      border-color: #5a8dee;
    }
    .field { margin-bottom: 1rem; }
    .field .errors {
      color: #ff7a7a;
      font-size: 0.85rem;
      margin-top: 0.25rem;
    }
    button[type="submit"] {
      width: 100%;
      padding: 0.7rem;
      background: #5a8dee;
      color: #fff;
      border: 0;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    button[type="submit"]:hover { background: #4a7bd8; }
    .messages { margin-bottom: 1rem; }
    .messages .msg {
      padding: 0.6rem 0.8rem;
      border-radius: 6px;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
    }
    .messages .error { background: #3a1f24; color: #ff9b9b; border: 1px solid #5a2a30; }
    .messages .info  { background: #1f2a3a; color: #9bb6dd; border: 1px solid #2a3a55; }
    .alt-link {
      display: block;
      margin-top: 1.25rem;
      text-align: center;
      color: #8a92a3;
      font-size: 0.85rem;
    }
    .alt-link a { color: #7aa9f0; text-decoration: none; }
    .alt-link a:hover { text-decoration: underline; }
    .totp-code {
      font-family: ui-monospace, "SF Mono", Monaco, monospace;
      letter-spacing: 0.3em;
      text-align: center;
      font-size: 1.4rem;
    }
    .qr {
      display: block;
      margin: 1rem auto;
      max-width: 220px;
      background: #fff;
      padding: 12px;
      border-radius: 8px;
    }
    .secret-fallback {
      font-family: ui-monospace, "SF Mono", Monaco, monospace;
      font-size: 0.85rem;
      background: #0f1419;
      padding: 0.5rem 0.7rem;
      border-radius: 4px;
      border: 1px solid #2a3144;
      word-break: break-all;
      margin: 0.5rem 0 1rem 0;
    }
    .codes-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin: 1rem 0;
      font-family: ui-monospace, monospace;
    }
    .codes-grid li {
      list-style: none;
      background: #0f1419;
      border: 1px solid #2a3144;
      padding: 0.5rem 0.75rem;
      border-radius: 4px;
      font-size: 0.95rem;
    }
    .warn {
      background: #3a2f1a;
      border: 1px solid #5a4a2a;
      color: #ffd28a;
      padding: 0.7rem 0.9rem;
      border-radius: 6px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="card{% block card_class %}{% endblock %}">
    {% if messages %}
      <div class="messages">
        {% for m in messages %}
          <div class="msg {{ m.tags|default:'info' }}">{{ m }}</div>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
