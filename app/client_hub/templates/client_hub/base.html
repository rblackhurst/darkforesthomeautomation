<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Dark Forest Home Automation{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      color: #1a1a1a;
      background: #f5f5f5;
      min-height: 100vh;
    }
    .site-header {
      background: #1a2e1a;
      color: #fff;
      padding: 0 1rem;
    }
    .header-inner {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    .site-header a { color: #d4e8d4; text-decoration: none; font-size: 0.9rem; }
    .site-header a:hover { color: #fff; }
    .brand { font-size: 1rem; font-weight: 600; color: #fff !important; }
    nav { display: flex; gap: 1.25rem; align-items: center; }
    nav form { margin: 0; }
    nav button {
      background: none; border: none; cursor: pointer;
      color: #d4e8d4; font-size: 0.9rem; padding: 0;
    }
    nav button:hover { color: #fff; }
    .container {
      max-width: 680px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 1rem; }
    h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.75rem; }
    h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; }
    p { margin-bottom: 0.75rem; }
    a { color: #1a6e1a; }
    a:hover { color: #0f4a0f; }
    .btn {
      display: inline-block;
      padding: 0.5rem 1.25rem;
      border-radius: 4px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      text-decoration: none;
    }
    .btn-primary {
      background: #1a6e1a;
      color: #fff;
    }
    .btn-primary:hover { background: #0f4a0f; color: #fff; }
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    .btn-secondary:hover { background: #e0e0e0; }
    .btn-danger {
      background: #b91c1c;
      color: #fff;
    }
    .btn-danger:hover { background: #991b1b; color: #fff; }
    label { display: block; font-weight: 500; margin-bottom: 0.25rem; font-size: 0.9rem; }
    input[type="email"], input[type="text"], input[type="tel"], textarea, select {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.95rem;
      font-family: inherit;
    }
    input:focus, textarea:focus, select:focus {
      outline: 2px solid #1a6e1a;
      border-color: #1a6e1a;
    }
    .form-group { margin-bottom: 1rem; }
    .errorlist { list-style: none; color: #b91c1c; font-size: 0.875rem; margin-top: 0.25rem; }
    .alert {
      padding: 0.75rem 1rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }
    .alert-success { background: #dcfce7; border: 1px solid #86efac; color: #14532d; }
    .alert-warning { background: #fefce8; border: 1px solid #fde047; color: #713f12; }
    .alert-danger  { background: #fee2e2; border: 1px solid #fca5a5; color: #7f1d1d; }
    .meta { font-size: 0.85rem; color: #666; }
    .divider { border: none; border-top: 1px solid #e0e0e0; margin: 1rem 0; }
    .site-footer {
      max-width: 680px;
      margin: 2rem auto 1rem;
      padding: 0 1rem;
      font-size: 0.8rem;
      color: #888;
    }
  </style>
</head>
<body>
  {% if request.customer %}
  <header class="site-header">
    <div class="header-inner">
      <a href="{% url 'client_hub:dashboard' %}" class="brand">Dark Forest Home Automation</a>
      <nav>
        <a href="{% url 'client_hub:dashboard' %}">My Properties</a>
        <a href="{% url 'client_hub:work_request_form' %}">Work Request</a>
        <a href="{% url 'client_hub:profile_edit' %}">My Profile</a>
        <form method="post" action="{% url 'client_hub:logout' %}">
          {% csrf_token %}
          <button type="submit">Sign Out</button>
        </form>
      </nav>
    </div>
  </header>
  {% endif %}

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <footer class="site-footer">
    <p>Need help? Call us or email <a href="mailto:noreply@darkforesthomeautomation.com">noreply@darkforesthomeautomation.com</a></p>
    <p>Need help logging in? Call us.</p>
  </footer>
</body>
</html>
