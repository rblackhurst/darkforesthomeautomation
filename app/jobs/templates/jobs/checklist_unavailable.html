{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ form_name }} — unavailable</title>
  <link rel="stylesheet" href="{% static 'jobs/backend_install.css' %}">
</head>
<body>
<main style="padding: 40px; max-width: 600px;">
  <h1>No {{ form_name|lower }} template published yet</h1>
  <p style="margin-top: 12px;">An admin needs to publish a <code>{{ slug }}</code> checklist template before this view will render.</p>
  <p style="margin-top: 12px;"><a href="{% url 'admin:jobs_job_change' job.invoice_number %}">← Back to job {{ job.invoice_number }}</a></p>
</main>
</body>
</html>
